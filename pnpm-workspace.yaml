packages:
  - "packages/*"
  # Apps are deployed (Vercel via CI), never published. Private workspaces, so
  # the release flow ignores them; they still share the catalog + Turbo pipeline.
  - "apps/*"
# pnpm 11 approves dependency build scripts via `allowBuilds` (replaces the old
# onlyBuiltDependencies list) and reads settings here, not from package.json.
allowBuilds:
  # deck.gl pulls this in transitively; it's a telemetry phone-home — never run it.
  "@vaadin/vaadin-usage-statistics": false
  esbuild: true
  lefthook: true
  sharp: true
catalog:
  typescript: ^6.0.3
  tsup: ^8.5.1
  vitest: ^4.1.9
  eslint: ^10.5.0
  "typescript-eslint": ^8.61.1
  prettier: ^3.8.4
  tsx: ^4.22.4
  "@types/node": ^26.0.0
