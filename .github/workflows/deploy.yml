name: Deploy

# Apps (apps/*) deploy here, CI-first, the same spirit as packages publishing in
# release.yml. Each app is its own Vercel project, keyed by its directory name —
# no project IDs, no dashboard clicks. The Vercel CLI creates the project on the
# first run (true first deploy) and reuses it after, using only the org-scoped
# VERCEL_KEY token.
#
# Adding an app = add its directory name to `matrix.app` below. That's it.
#
# All vercel commands run from the REPO ROOT, and we set the project's Root
# Directory to apps/<app> explicitly (via the API) so `vercel build` resolves the
# pnpm workspace from the root exactly like local — and never doubles the path.
#
# Each app is served at <name>.<APPS_DOMAIN> (default aubron.io) — e.g.
# transit.aubron.io. The subdomain is attached to the project automatically;
# since the apex is already on Vercel, no per-app DNS is needed.
#
# Optional, shared (not per-app): set a VERCEL_SCOPE repo variable to a Vercel
# team slug if the token can see multiple teams, and an APPS_DOMAIN variable to
# override aubron.io. Apps that need runtime secrets (e.g. OBA_API_KEY) get them
# set once on their Vercel project's env.

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [transit, karaoke]
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_KEY }}
      VERCEL_SCOPE: ${{ vars.VERCEL_SCOPE }}
      APPS_DOMAIN: ${{ vars.APPS_DOMAIN || 'aubron.io' }}
    steps:
      - uses: actions/checkout@v7
      # Without the token this workflow no-ops cleanly (keeps main green).
      - name: Check for token
        id: guard
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_KEY not set — skipping deploy of '${{ matrix.app }}'."
          fi
      - uses: pnpm/action-setup@v6
        if: steps.guard.outputs.ok == 'true'
      - uses: actions/setup-node@v6
        if: steps.guard.outputs.ok == 'true'
        with:
          node-version: 24
          cache: pnpm
      - name: Install Vercel CLI
        if: steps.guard.outputs.ok == 'true'
        run: npm i -g vercel@latest
      # Create-or-link the project named after the app dir. Writes .vercel/ at the
      # repo root with the project + org ids.
      - name: Link project (creates it on first run)
        if: steps.guard.outputs.ok == 'true'
        run: vercel link --yes --project "${{ matrix.app }}" ${VERCEL_SCOPE:+--scope "$VERCEL_SCOPE"} --token "$VERCEL_TOKEN"
      # Pin Root Directory = apps/<app> deterministically, so building from the
      # repo root resolves to the app (no dependence on Vercel's auto-detection,
      # and no apps/<app>/apps/<app> doubling).
      - name: Set Root Directory
        if: steps.guard.outputs.ok == 'true'
        run: |
          proj=$(jq -r '.projectId' .vercel/project.json)
          org=$(jq -r '.orgId' .vercel/project.json)
          q=""
          case "$org" in team_*) q="?teamId=$org" ;; esac
          code=$(curl -s -o /tmp/proj.json -w '%{http_code}' -X PATCH \
            "https://api.vercel.com/v9/projects/${proj}${q}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory":"apps/${{ matrix.app }}"}')
          if [ "$code" = "200" ]; then
            echo "::notice::Root Directory set to apps/${{ matrix.app }}."
          else
            echo "::warning::Could not set Root Directory (HTTP $code): $(cat /tmp/proj.json)"
          fi
      # Attach <app>.<APPS_DOMAIN> to the project so production deploys serve
      # there. Idempotent: a no-op once the subdomain is already assigned.
      - name: Attach domain
        if: steps.guard.outputs.ok == 'true'
        run: |
          domain="${{ matrix.app }}.${APPS_DOMAIN}"
          if vercel domains add "$domain" "${{ matrix.app }}" ${VERCEL_SCOPE:+--scope "$VERCEL_SCOPE"} --token "$VERCEL_TOKEN"; then
            echo "::notice::Attached $domain to project ${{ matrix.app }}."
          else
            echo "::notice::$domain already attached (or apex not on this scope) — continuing."
          fi
      - name: Pull settings + env
        if: steps.guard.outputs.ok == 'true'
        run: vercel pull --yes --environment=production ${VERCEL_SCOPE:+--scope "$VERCEL_SCOPE"} --token "$VERCEL_TOKEN"
      - name: Build
        if: steps.guard.outputs.ok == 'true'
        run: vercel build --prod --token "$VERCEL_TOKEN"
      - name: Deploy prebuilt output
        if: steps.guard.outputs.ok == 'true'
        run: vercel deploy --prebuilt --prod ${VERCEL_SCOPE:+--scope "$VERCEL_SCOPE"} --token "$VERCEL_TOKEN"
