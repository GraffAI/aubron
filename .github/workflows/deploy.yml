name: Deploy

# Apps (apps/*) deploy here, CI-first, the same spirit as packages publishing in
# release.yml. Each app is its own Vercel project, keyed by its directory name —
# no project IDs, no dashboard clicks. The Vercel CLI creates the project on the
# first run (true first deploy) and reuses it after, using only the org-scoped
# VERCEL_KEY token.
#
# Adding an app = add its directory name to `matrix.app` below. That's it.
#
# Optional, shared (not per-app): set a VERCEL_SCOPE repo variable to a Vercel
# team slug if the token can see multiple teams. Apps that need runtime secrets
# (e.g. OBA_API_KEY) get them set once on their Vercel project's env.

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [transit]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_KEY }}
      VERCEL_SCOPE: ${{ vars.VERCEL_SCOPE }}
    steps:
      - uses: actions/checkout@v6
      # Without the token this workflow no-ops cleanly (keeps main green).
      - name: Check for token
        id: guard
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_KEY not set — skipping deploy of '${{ matrix.app }}'."
          fi
      - uses: pnpm/action-setup@v6
        if: steps.guard.outputs.ok == 'true'
      - uses: actions/setup-node@v6
        if: steps.guard.outputs.ok == 'true'
        with:
          node-version: 24
          cache: pnpm
      - name: Install Vercel CLI
        if: steps.guard.outputs.ok == 'true'
        run: npm i -g vercel@latest
      # Create-or-link the project named after the app dir. Vercel records the
      # Root Directory (apps/<app>, relative to the repo root) in .vercel/, so the
      # build below resolves the pnpm workspace from the root exactly like local.
      - name: Link project (creates it on first run)
        if: steps.guard.outputs.ok == 'true'
        run: vercel link --yes --project "${{ matrix.app }}" ${VERCEL_SCOPE:+--scope "$VERCEL_SCOPE"} --token "$VERCEL_TOKEN"
      - name: Pull settings + env
        if: steps.guard.outputs.ok == 'true'
        run: vercel pull --yes --environment=production ${VERCEL_SCOPE:+--scope "$VERCEL_SCOPE"} --token "$VERCEL_TOKEN"
      - name: Build
        if: steps.guard.outputs.ok == 'true'
        run: vercel build --prod --token "$VERCEL_TOKEN"
      - name: Deploy prebuilt output
        if: steps.guard.outputs.ok == 'true'
        run: vercel deploy --prebuilt --prod ${VERCEL_SCOPE:+--scope "$VERCEL_SCOPE"} --token "$VERCEL_TOKEN"
